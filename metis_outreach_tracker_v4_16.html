function persist() {

}

function saveData() {
  const blob = new Blob([JSON.stringify(ST, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'metis_tracker_data.json';
  a.click();
  URL.revokeObjectURL(a.href);
  setSync('saved', 'Saved ✓ — keep metis_tracker_data.json safe');
}

function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const saved = JSON.parse(e.target.result);
      PROSPECTS.forEach(p => {
        const def = { status:p.status, lastTouch:p.lastTouch, nextStep:p.nextStep, notes:p.notes, status2:'not-started', lastTouch2:'', notes2:'', statusEmail:'not-started', lastTouchEmail:'', notesEmail:'' };
        ST[p.id] = Object.assign({}, def, saved[p.id] || {});
      });
      setSync('saved', 'Data loaded from ' + file.name + ' ✓');
      renderSummary(); renderTable();
    } catch(err) {
      setSync('error', 'Error loading file — make sure it\'s a valid metis_tracker_data.json');
    }
  };
  reader.readAsText(file);
}

// Cumulative tally: count prospects that have EVER reached each stage
// A prospect counts toward a stage if its primary OR backup status is at or past that stage
function stageIndex(status) {
  return PIPELINE_ORDER.indexOf(status);
}

function renderSummary() {
  const total = PROSPECTS.length;
  let notStarted = 0, everSent = 0, everConnected = 0, everMsg2 = 0, everResponded = 0, everCall = 0, onHold = 0;

  PROSPECTS.forEach(p => {
    const s = ST[p.id] || {};
    const st1 = s.status || 'not-started';
    const st2 = s.status2 || 'not-started';

    // Best status across primary and backup
    const idx1 = stageIndex(st1);
    const idx2 = stageIndex(st2);
    const bestIdx = Math.max(idx1, idx2);
    const bestStatus = bestIdx >= 0 ? PIPELINE_ORDER[bestIdx] : st1;

    if (st1 === 'hold' && st2 === 'not-started') { onHold++; return; }
    if (bestStatus === 'not-started' && st1 === 'not-started') { notStarted++; return; }

    // Cumulative — count at each level reached
    if (bestIdx >= 0) everSent++;
    if (bestIdx >= PIPELINE_ORDER.indexOf('connected')) everConnected++;
    if (bestIdx >= PIPELINE_ORDER.indexOf('msg2sent')) everMsg2++;
    if (bestIdx >= PIPELINE_ORDER.indexOf('responded')) everResponded++;
    if (bestIdx >= PIPELINE_ORDER.indexOf('call')) everCall++;
    if (bestIdx < 0 && st1 !== 'not-started') everSent++; // inmail counts as sent
  });

  // Recount not started properly
  notStarted = PROSPECTS.filter(p => {
    const s = ST[p.id] || {};
    return (s.status || 'not-started') === 'not-started' && (s.status2 || 'not-started') === 'not-started';
  }).length;

  onHold = PROSPECTS.filter(p => ['hold','hold-contact','hold-circle'].includes(ST[p.id]?.status || 'not-started')).length;
  const declined = PROSPECTS.filter(p => ['declined-now','declined'].includes(ST[p.id]?.status || 'not-started')).length;

  document.getElementById('summary').innerHTML = [
    {n:total,         l:'Total',           gold:false},
    {n:everSent,      l:'Ever contacted',   gold:false},
    {n:everConnected, l:'Ever connected',   gold:false},
    {n:everMsg2,      l:'Msg 2 sent',       gold:false},
    {n:everResponded, l:'Responded',        gold:true },
    {n:everCall,      l:'Call scheduled',   gold:true },
    {n:notStarted,    l:'Not started',      gold:false},
    {n:onHold,        l:'On hold',          gold:false},
    {n:declined,      l:'Declined',         gold:false},
  ].map(i=>`<div class="scard"><div class="snum${i.gold&&i.n>0?' gold':''}">${i.n}</div><div class="slbl">${i.l}</div></div>`).join('');
}

function renderTable() {
  document.getElementById('tbody').innerHTML = PROSPECTS.map(p => {

    const sc2 = SC[s.status2] || SC['not-started'];
    const scEmail = SC[s.statusEmail] || null;
    const vc = V_CONFIG[p.v];
    const show = cf==='all' || cf===p.v || cf===s.status || cf===s.status2 ||
      (['hold','hold-contact','hold-circle'].includes(cf) && s.status===cf);
    const hasBackup = p.backup && p.backup.name;
    const backupActive = hasBackup && (s.status2 || 'not-started') !== 'not-started';
    const emailActive = (s.statusEmail || 'not-started') !== 'not-started';

  const curEmail = s.statusEmail || 'not-started';
  if (!activeContact[id]) activeContact[id] = 'primary';
  if (!activeMsg[id]) activeMsg[id] = ['connected','msg2sent','responded','call'].includes(cur1) ? '2' : '1';
  const isInmail = p.msg1.startsWith('⚠️');
  const vc = V_CONFIG[p.v];
  const hasBackup = p.backup && p.backup.name;

  // Parse backup messages — split by —— divider in msg2
  const msg2parts = p.msg2.split('\n\n——\n');
  const primaryMsg2 = msg2parts[0];
  // Find escalation block — look for "Escalation —" or "Connection request:" pattern
  const escalationBlock = msg2parts.slice(1).join('\n\n——\n');

  const opts1 = Object.entries(SC).map(([k,v])=>`<option value="${k}" ${cur1===k?'selected':''}>${v.label} — ${v.desc}</option>`).join('');
  const opts2 = Object.entries(SC).map(([k,v])=>`<option value="${k}" ${cur2===k?'selected':''}>${v.label} — ${v.desc}</option>`).join('');

  let noteHtml = '';
  if (isInmail) noteHtml = `<div class="note-blue">⚠️ LinkedIn blocked direct connection (3rd degree). InMail sent instead.</div>`;
  if (id==='gmenergy') noteHtml = `<div class="note-amber">⚠️ Jillian Marton is 3rd degree—check LinkedIn before sending. InMail may be required.</div>`;
  if (id==='enphase' && cur1==='sent') noteHtml = `<div class="note-green">✓ Connection request sent to Ken Milhous.</div>`;

  document.getElementById('dcontent').innerHTML = `
    <div class="dcompany">${p.company}</div>
    <div class="dsub"><span class="vtag ${vc.cls}" style="margin-right:6px">${vc.label}</span>Priority ${p.pri}/5</div>

    <div class="dsec">METIS angle</div>
    <div class="angle-box">${p.angle}</div>

    <div class="dsec">Contacts</div>
    <div class="ccard"><div class="crole">Primary</div><div class="cnm">${p.primary.name}</div><div class="ctt">${p.primary.title}</div></div>
    ${hasBackup ? `<div class="ccard"><div class="crole">Backup / escalation</div><div class="cnm">${p.backup.name}</div><div class="ctt">${p.backup.title}</div></div>` : ''}

    <!-- Contact selector tabs -->
    ${hasBackup ? `
    <div class="dsec">Outreach by contact</div>
    <div class="msg-tabs" style="margin-bottom:12px">
      <button class="mtab ${activeContact[id]==='primary'?'active':''}" onclick="switchContact('${id}','primary')">Primary — ${p.primary.name.split(' ')[0]}</button>
      <button class="mtab ${activeContact[id]==='backup'?'active':''}" onclick="switchContact('${id}','backup')">Backup — ${p.backup.name.split(' ')[0]}</button>
      <button class="mtab ${activeContact[id]==='email'?'active':''}" onclick="switchContact('${id}','email')">✉ Email</button>
    </div>` : `<div class="dsec">Outreach messages</div>
    <div class="msg-tabs" style="margin-bottom:12px">
      <button class="mtab ${activeContact[id]!=='email'?'active':''}" onclick="switchContact('${id}','primary')">LinkedIn</button>
      <button class="mtab ${activeContact[id]==='email'?'active':''}" onclick="switchContact('${id}','email')">✉ Email</button>
    </div>`}

    <!-- Primary contact section -->
    <div id="section-primary-${id}" style="${activeContact[id]==='backup'&&hasBackup||activeContact[id]==='email'?'display:none':''}">
      ${noteHtml}
      <div class="msg-tabs">
        <button class="mtab ${activeMsg[id]==='1'?'active':''}" onclick="switchMsg('${id}','1')">${isInmail?'InMail sent':'1 · Connection request'}</button>
        <button class="mtab ${activeMsg[id]==='2'?'active':''}" onclick="switchMsg('${id}','2')">2 · Follow-up</button>
      </div>
      <div class="msg-box" id="msgbox-${id}">${activeMsg[id]==='1'?p.msg1:primaryMsg2}</div>
      <div class="divider"></div>
      <div class="dsec">Primary contact status — LinkedIn</div>
      <div class="status-row">
        <select class="fsel" id="sel-${id}" onchange="updateStatus('${id}')">${opts1}</select>
        <input type="date" class="finput" id="date-${id}" value="${s.lastTouch||''}" onchange="updateDate('${id}')">
      </div>
      <div class="form-label">Notes — ${p.primary.name}</div>
      <textarea class="fullw" id="notes-${id}" style="min-height:60px" onchange="ST['${id}'].notes=this.value;persist();">${s.notes||''}</textarea>
    </div>

    <!-- Backup contact section -->
    ${hasBackup && escalationBlock ? `
    <div id="section-backup-${id}" style="${activeContact[id]!=='backup'?'display:none':''}">
      <div class="note-amber" style="margin-bottom:8px">Escalation contact — use after primary goes dark</div>
      <div class="msg-box" style="margin-bottom:12px">${escalationBlock}</div>
      <div class="divider"></div>
      <div class="dsec">Backup contact status — ${p.backup.name}</div>
      <div class="status-row">
        <select class="fsel" id="sel2-${id}" onchange="updateStatus2('${id}')">${opts2}</select>
        <input type="date" class="finput" id="date2-${id}" value="${s.lastTouch2||''}" onchange="updateDate2('${id}')">
      </div>
      <div class="form-label">Notes — ${p.backup.name}</div>
      <textarea class="fullw" id="notes2-${id}" style="min-height:60px" onchange="ST['${id}'].notes2=this.value;persist();">${s.notes2||''}</textarea>
    </div>` : ''}

    <!-- Email outreach section -->
    <div id="section-email-${id}" style="${activeContact[id]!=='email'?'display:none':''}">
      <div class="note-blue" style="margin-bottom:8px">✉ Cold email outreach — separate from LinkedIn</div>
      ${p.email ? `<div class="msg-box" style="margin-bottom:12px">${p.email}</div>` : '<div class="msg-box" style="margin-bottom:12px;color:var(--text3)">No email message drafted yet for this prospect.</div>'}
      <div class="divider"></div>
      <div class="dsec">Email status</div>
      <div class="status-row">
        <select class="fsel" id="selEmail-${id}" onchange="updateStatusEmail('${id}')">
          <option value="not-started" ${curEmail==='not-started'?'selected':''}>Not started</option>
          <option value="email-sent" ${curEmail==='email-sent'?'selected':''}>Email sent</option>
          <option value="email-opened" ${curEmail==='email-opened'?'selected':''}>Email opened</option>
          <option value="email-replied" ${curEmail==='email-replied'?'selected':''}>Email replied</option>
          <option value="declined-now" ${curEmail==='declined-now'?'selected':''}>Declined — Not now</option>
          <option value="declined" ${curEmail==='declined'?'selected':''}>Declined — Not interested</option>
        </select>
        <input type="date" class="finput" id="dateEmail-${id}" value="${s.lastTouchEmail||''}" onchange="updateDateEmail('${id}')">
      </div>
      <div class="form-label">Email notes / address used</div>
      <textarea class="fullw" id="notesEmail-${id}" style="min-height:60px" onchange="ST['${id}'].notesEmail=this.value;persist();">${s.notesEmail||''}</textarea>
    </div>

    <div class="divider"></div>
    <div class="form-label">Next step</div>
    <input class="fullw" id="ns-${id}" value="${(s.nextStep||'').replace(/"/g,'&quot;')}" placeholder="e.g. Follow up Friday" onchange="ST['${id}'].nextStep=this.value;persist();">
    <div style="margin-top:8px;font-size:11px;color:var(--text3)">Changes save automatically. Click 💾 Save data file at the bottom of the screen to save to your file.</div>
  `;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function switchContact(id, which) {
  activeContact[id] = which;
  const pSec = document.getElementById('section-primary-'+id);
  const bSec = document.getElementById('section-backup-'+id);
  const eSec = document.getElementById('section-email-'+id);
  if (pSec) pSec.style.display = which==='primary' ? '' : 'none';
  if (bSec) bSec.style.display = which==='backup'  ? '' : 'none';
  if (eSec) eSec.style.display = which==='email'   ? '' : 'none';
  document.querySelectorAll(`#dcontent .msg-tabs:first-of-type .mtab`).forEach(b => b.classList.remove('active'));
  const tabs = document.querySelectorAll(`#dcontent .msg-tabs:first-of-type .mtab`);
  tabs.forEach(b => { if (b.textContent.toLowerCase().includes(which) || (which==='primary' && b.textContent.toLowerCase().includes('primary')) || (which==='email' && b.textContent.includes('✉'))) b.classList.add('active'); });
}

function switchMsg(id, n) {
  activeMsg[id] = n;
  const p = PROSPECTS.find(x=>x.id===id);
  const msg2parts = p.msg2.split('\n\n——\n');
  const primaryMsg2 = msg2parts[0];
  document.getElementById('msgbox-'+id).textContent = n==='1' ? p.msg1 : primaryMsg2;
  document.querySelectorAll('#section-primary-'+id+' .mtab').forEach((b,i)=>b.classList.toggle('active',String(i+1)===n));
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
function updateStatus(id)      { ST[id].status=document.getElementById('sel-'+id).value; persist(); renderTable(); renderSummary(); }
function updateStatus2(id)     { ST[id].status2=document.getElementById('sel2-'+id).value; persist(); renderTable(); renderSummary(); }
function updateStatusEmail(id) { ST[id].statusEmail=document.getElementById('selEmail-'+id).value; persist(); renderTable(); renderSummary(); }
function updateDate(id)        { ST[id].lastTouch=document.getElementById('date-'+id).value; persist(); renderTable(); }
function updateDate2(id)       { ST[id].lastTouch2=document.getElementById('date2-'+id).value; persist(); renderTable(); }
function updateDateEmail(id)   { ST[id].lastTouchEmail=document.getElementById('dateEmail-'+id).value; persist(); renderTable(); }
function saveRow(id) {
  ST[id].notes       = document.getElementById('notes-'+id)?.value || ST[id].notes;
  ST[id].notes2      = document.getElementById('notes2-'+id)?.value || ST[id].notes2;
  ST[id].notesEmail  = document.getElementById('notesEmail-'+id)?.value || ST[id].notesEmail;
  ST[id].nextStep    = document.getElementById('ns-'+id).value;
  persist(); renderTable();
  const el=document.getElementById('conf-'+id);
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2000);
  setSync('saved', 'Unsaved changes — click 💾 Save data file');
}
function filterAll(b){ cf='all'; sa(b); renderTable(); }
function filterV(b,v) { cf=v;   sa(b); renderTable(); }
function filterS(b,s) { cf=s;   sa(b); renderTable(); }
function sa(b){ document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); }

loadState();
</script>
</body>
</html>
